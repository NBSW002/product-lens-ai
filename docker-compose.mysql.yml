services:
  mysql:
    image: mysql:8.4
    container_name: productlens-mysql-3307
    restart: unless-stopped
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootPass_ChangeMe_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-product_lens}
      MYSQL_USER: ${MYSQL_USER:-product_lens_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-AppPass_ChangeMe_2026}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - productlens-mysql-data:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-RootPass_ChangeMe_2026}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  productlens-mysql-data:
